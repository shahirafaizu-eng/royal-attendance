{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <div class="auth-hero">
        <h2>Welcome to Attendance Register</h2>
        <p>Secure and smart attendance management for every student.</p>
        <div class="hero-badges">
            <span>Live Tracking</span>
            <span>Present & Absent</span>
            <span>Rich Dashboard</span>
        </div>
    </div>
    <form method="post" class="auth-form">
        <h3>Login</h3>
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Enter Portal</button>
        <p class="auth-switch">
            Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
        </p>
    </form>
</div>
{% endblock %}
